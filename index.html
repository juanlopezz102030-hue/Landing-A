<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CAYO Uruguay | WhatsApp</title>
  <meta name="description" content="Chateá con CAYO Uruguay por WhatsApp." />
  <meta name="theme-color" content="#f5f5f5" />
  <link rel="icon" href="assets/whatsapp-icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/whatsapp-icon.png" />
  <link rel="preload" as="image" href="assets/cayo-uruguay-logo.png" />
  <link rel="preload" as="image" href="assets/verified-badge.png" />
  <link rel="preload" as="image" href="assets/whatsapp-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Contacto por WhatsApp">
      <img class="brand-logo" src="assets/cayo-uruguay-logo.png" alt="Logo de CAYO Uruguay" />

      <div class="profile-name" aria-label="Perfil de marca">
        <h1>CAYO Uruguay</h1>
        <img class="verified-badge" src="assets/verified-badge.png" alt="Cuenta verificada" />
      </div>

      <p class="brand">© 2026 CAYO Uruguay.</p>
      <p class="instruction">Hacé click para iniciar la conversación por WhatsApp.</p>

      <a id="whatsappButton" class="button" href="#" target="_blank" rel="noopener noreferrer" aria-label="Chatear por WhatsApp con CAYO Uruguay">
        <img class="button-icon" src="assets/whatsapp-icon.png" alt="" aria-hidden="true" />
        <span>Chatear por WhatsApp</span>
      </a>
    </section>

    <footer class="footer">
      <p>Todos los derechos reservados.</p>
      <nav aria-label="Enlaces legales">
        <a href="politica-de-privacidad.html">Política de Privacidad</a>
        <span aria-hidden="true"> · </span>
        <a href="terminos-y-condiciones.html">Términos y Condiciones</a>
      </nav>
      <a class="email" href="mailto:cayo.uruguay@gmail.com">Contacto: cayo.uruguay@gmail.com</a>
    </footer>
  </main>

  <script>
    const phoneNumber = "5521920234018"; // Cambiá este número por tu WhatsApp: país + característica + número, sin + ni espacios.
    const message = "Hola, quiero iniciar una conversación.";
    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
    document.getElementById("whatsappButton").href = whatsappUrl;
  </script>
</body>
</html>
